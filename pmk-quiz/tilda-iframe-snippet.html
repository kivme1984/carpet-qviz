<!-- PMK quiz iframe. Замените QUIZ_URL на ссылку на загруженный index.html -->
<div id="pmk-quiz-embed" style="width:100%;max-width:1180px;margin:0 auto;">
  <iframe id="pmk-quiz-frame" src="QUIZ_URL" style="width:100%;height:980px;border:0;border-radius:28px;overflow:hidden;background:transparent;" loading="lazy" title="Калькулятор чистки ковров Промой Ковер"></iframe>
</div>
<script>
(function(){
  var frame = document.getElementById('pmk-quiz-frame');
  window.addEventListener('message', function(e){
    if(!e.data || typeof e.data !== 'object') return;
    if(e.data.type === 'pmk-quiz-height' && frame){
      var h = Math.max(760, Math.min(2400, Number(e.data.height || 980)));
      frame.style.height = h + 'px';
    }
    if(e.data.type === 'pmk-quiz-step' && frame && window.innerWidth <= 768){
      setTimeout(function(){ frame.scrollIntoView({behavior:'smooth', block:'start'}); }, 80);
    }
  });
})();
</script>
